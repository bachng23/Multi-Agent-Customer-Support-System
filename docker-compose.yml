services:
  qdrant_db:
    image: qdrant/qdrant:v1.17
    container_name: qdrant_db
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC port
    networks:
      - mass_network
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_db:
    image: postgres:17.9-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mass_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mass_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adminer:
    image: adminer:latest
    container_name: adminer_gui
    restart: always
    ports:
      - "8080:8080"
    networks:
      - mass_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mass_network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
